<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
    <script src="tailwind.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-['Inter'] flex flex-col gap-3">
    <header>
      <div class="bg-gray-100 flex flex-col items-center justify-center w-full h-96">
        <!-- دکمه برگشت به صفحه قبل  -->
        <button class="text-2xl absolute top-3 left-4">←</button>
        <img class="w-80 h-auto" src="image-shoe-3.png" />
        <!-- دکمه های پایین عکس -->
        <div class="flex justify-center gap-2 mt-20 bottom-0">
          <div class="w-2 h-2 rounded-full bg-black"></div>
          <div class="w-2 h-2 rounded-full bg-gray-300"></div>
          <div class="w-2 h-2 rounded-full bg-gray-300"></div>
        </div>
      </div>
    </header>
    <main>
      <div class="flex flex-row justify-between mx-4 my-4">
        <!-- نام محصول -->
        <h1 class="font-bold text-3xl">Runnig sportwear</h1>
        <button class="py-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="white"
            stroke="black"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"
            />
          </svg>
        </button>
      </div>
      <div class="flex flex-row">
        <button
          class="ml-1 text-sm bg-gray-100 text-slate-950 rounded-md h-[26px] px-3"
        >
          6.631 sold
        </button>

        <!-- امتیاز ایکون ستاره -->
        <div class="py-1 ml-4">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
          >
            <defs>
              <linearGradient id="halfStar1">
                <stop offset="50%" stop-color="black" />
                <stop offset="50%" stop-color="white" />
                <stop offset="100%" stop-color="white" />
              </linearGradient>
            </defs>

            <path
              d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
              fill="url(#halfStar1)"
              stroke="black"
              stroke-width="0.5"
            />
          </svg>
        </div>
        <!-- امتیاز کاربر ها -->
        <span class="ml-2 text-slate-500"
          >4.5 <span>(5,389reviews)</span>
        </span>
      </div>
      <!-- descriptionقسمت مربوط به -->
      <div class="">
        <div class="w-96 h-[1px] bg-gray-300 mt-6 mb-3 mx-5"></div>

        <div class="mx-5">
          <h1 class="font-bold text-xl">Description</h1>
          <p class="py-2 text-sm text-slate-600">
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Deleniti,
            et dolores! Minus ad fugiat qui nobis!
            <!-- دکمه مربوط به view more... -->
            <button class="font-bold">view more..</button>
          </p>
        </div>
      </div>
      <!-- مربوط به دکمه های sizeوcolor -->
      <div class="flex flex-row justify-around gap-16 mr-44 mt-2">
        <!-- دکمه Size  -->
        <div class="flex flex-col">
          <h1 class="ml-5 font-semibold">Size</h1>
          <div class="flex flex-row gap-2 ml-5 mt-2">
            <button
              class="w-7 h-7 rounded-full border-2 border-gray-600 text-slate-600 text-xs hover:bg-black hover:text-white"
            >
              40
            </button>
            <button
              class="w-7 h-7 rounded-full border-2 border-gray-600 text-slate-600 text-xs hover:bg-black hover:text-white"
            >
              41
            </button>
            <button
              class="w-7 h-7 rounded-full border-2 border-gray-600 text-slate-600 text-xs hover:bg-black hover:text-white"
            >
              42
            </button>
          </div>
        </div>

        <!-- color دکمه  -->
        <div class="flex flex-col">
          <h1 class="ml-5 font-semibold">Color</h1>

          <div class="flex flex-row gap-2 ml-5 mt-2">
            <button
              class="px-0.5 w-7 h-7 rounded-full bg-zinc-50 border-2 border-gray-500 text-slate-500 text-xs"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.25"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-check-icon lucide-check"
              >
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </button>

            <button
              class="w-7 h-7 rounded-full bg-gray-600 border-gray-500 text-slate-500 text-xs"
            ></button>

            <button
              class="w-7 h-7 rounded-full bg-purple-600 border-gray-500 text-slate-500 text-xs"
            ></button>

            <button
              class="w-7 h-7 rounded-full bg-[#8B5E3C] border-gray-500 text-slate-500 text-xs"
            ></button>

            <button
              class="w-7 h-7 rounded-full bg-[#3399FF] border-gray-500 text-slate-500 text-xs"
            ></button>
          </div>
        </div>
      </div>
      <!-- دکمه های تغییر تعداد -->
      <div class="flex flex-row items-center gap-7 m-5">
        <span class="text-lg font-semibold">Quantity</span>
        <div
          class="flex flex-row justify-between gap-4 px-4 py-1 bg-gray-100 w-24 font-semibold rounded-full"
        >
          <button>-</button>
          <span>0</span>
          <button>+</button>
        </div>
      </div>

      <hr class="m-5" />

      <!-- محاسبه قیمت -->
      <div class="flex flex-row items-center justify-between m-5">
        <div class="flex flex-col justify-start gap-2">
          <span class="text-xs text-gray-500">Total price</span>
          <span class="text-xl font-bold">$240.00</span>
        </div>
        <button
          class="flex flex-row items-center justify-center gap-5 bg-black text-white font-semibold rounded-full w-60 h-14 shadow-black"
        >
          <!-- آیکون سبد خرید داخل دکمه -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="w-6 h-6"
            viewBox="0 0 20 20"
          >
            <path d="M0 0h20v20H0z" fill="none" />
            <path
              fill="currentColor"
              fill-rule="evenodd"
              d="M10 2a4 4 0 0 0-4 4v1H5a1 1 0 0 0-.994.89l-1 9A1 1 0 0 0 4 18h12a1 1 0 0 0 .994-1.11l-1-9A1 1 0 0 0 15 7h-1V6a4 4 0 0 0-4-4m2 5V6a2 2 0 1 0-4 0v1zm-6 3a1 1 0 1 1 2 0a1 1 0 0 1-2 0m7-1a1 1 0 1 0 0 2a1 1 0 0 0 0-2"
              clip-rule="evenodd"
            />
          </svg>
          Add to Cart
        </button>
      </div>
    </main>
  </body>
</html>
