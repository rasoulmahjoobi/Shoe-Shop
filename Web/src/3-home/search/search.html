<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search</title>

    <script src="tailwind.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-white font-['Inter'] text-[#222222]">
    <main class="mx-auto min-h-screen w-full max-w-[428px] px-5 pt-7 pb-28">
      <!-- Search Input -->
      <section>
        <div
          class="flex h-[48px] items-center rounded-[14px] bg-slate-100 border border-[#B8B8B8] px-4"
        >
          <!-- آیکون سرچ -->
          <svg
            class="h-5 w-5 shrink-0"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M11 19C15.4183 19 19 15.4183 19 11C19 6.58172 15.4183 3 11 3C6.58172 3 3 6.58172 3 11C3 15.4183 6.58172 19 11 19Z"
              stroke="#777777"
              stroke-width="1.8"
            />
            <path
              d="M21 21L16.65 16.65"
              stroke="#777777"
              stroke-width="1.8"
              stroke-linecap="round"
            />
          </svg>

          <!--
            input سرچ

            بعداً با API:
            مقدار این input باید به API ارسال شود.
            مثال:
            GET /products?search=${searchInput.value}
          -->
          <input
            id="searchInput"
            type="text"
            placeholder="Search"
            autocomplete="off"
            class="ml-3 h-full min-w-0 flex-1 bg-transparent text-[13px] outline-none placeholder:text-[#999999]"
          />

          <!-- آیکون filter موقت -->
          <button
            id="filterButton"
            type="button"
            aria-label="Filter"
            class="ml-3 flex h-8 w-8 items-center justify-center"
          >
            <svg
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M5 7H19"
                stroke="#444444"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M8 12H16"
                stroke="#444444"
                stroke-width="2"
                stroke-linecap="round"
              />
              <path
                d="M11 17H13"
                stroke="#444444"
                stroke-width="2"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>
      </section>

      <!-- Recent Search حالت اول
           وقتی input خالی باشد نمایش داده می‌شود -->
      <section id="recentSection" class="mt-7">
        <div class="flex items-center justify-between">
          <h2 class="text-[15px] font-bold">Recent</h2>

          <button
            id="clearAllButton"
            type="button"
            class="text-[12px] font-medium text-[#333333]"
          >
            Clear All
          </button>
        </div>

        <!-- لیست سرچ‌های اخیر -->
        <div id="recentList" class="mt-5 space-y-4"></div>
      </section>

      <!-- Result Header
           وقتی نتیجه پیدا شود نمایش داده می‌شود -->
      <section id="resultHeader" class="mt-7 hidden">
        <div class="flex items-center justify-between">
          <p id="resultText" class="text-[13px] font-bold"></p>

          <p id="resultCount" class="text-[11px] text-[#555555]"></p>
        </div>
      </section>

      <!-- Product Results حالت سوم
           وقتی محصول پیدا شود نمایش داده می‌شود -->
      <section
        id="productsSection"
        class="mt-5 grid grid-cols-2 gap-x-4 gap-y-6"
      ></section>

      <!-- Not Found حالت دوم
           وقتی نتیجه‌ای پیدا نشود نمایش داده می‌شود -->
      <section
        id="notFoundSection"
        class=" flex flex-col items-center px-5 pt-20 text-center"
      >
        <!-- تصویر مشابه فیگما با CSS -->
        <div class="relative h-[220px] w-[250px]">
          <!-- کارت عقب -->
          <div
            class="absolute left-[35px] top-[24px] h-[150px] w-[120px] rotate-[-16deg] rounded-[10px] border border-[#4B4B55] bg-white"
          >
            <div
              class="absolute left-1/2 top-[-18px] h-[32px] w-[105px] -translate-x-1/2 rounded-[5px] bg-[#111111]"
            ></div>

            <div
              class="absolute left-[17px] top-[24px] h-[112px] w-[85px] rounded-[4px] bg-[#F0F0F0]"
            ></div>

            <div
              class="absolute left-1/2 top-[-31px] h-[20px] w-[20px] -translate-x-1/2 rounded-full border-[3px] border-[#111111] bg-white"
            ></div>
          </div>

          <!-- کارت جلو -->
          <div
            class="absolute right-[18px] top-[58px] h-[165px] w-[150px] rounded-[10px] border border-[#4B4B55] bg-white"
          >
            <div
              class="absolute left-1/2 top-[-18px] h-[34px] w-[108px] -translate-x-1/2 rounded-[5px] bg-[#111111]"
            ></div>

            <div
              class="absolute left-[19px] top-[22px] h-[122px] w-[112px] rounded-[4px] bg-[#E7E7E7]"
            ></div>

            <div
              class="absolute left-1/2 top-[-31px] h-[20px] w-[20px] -translate-x-1/2 rounded-full border-[3px] border-[#111111] bg-white"
            ></div>
          </div>
        </div>

        <h2 class="mt-8 text-[19px] font-extrabold">Not Found</h2>

        <p class="mt-3 max-w-[255px] text-[12px] leading-5 text-[#666666]">
          Sorry, the keyword you entered cannot be found, please check again or
          search with another keyword.
        </p>
      </section>
    </main>

    <!-- nav-bar -->
    <!-- توسط js اضافه میشود -->
    <div id="navbar"></div>

    <script type="module" src="search.js"></script>
  </body>
</html>
