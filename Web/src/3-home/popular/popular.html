<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Most-Popular</title>
    <script src="tailwind.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-['Inter']">
    <div class="flex flex-row gap-2 items-center w-60 h-16 mx-8">
      <!-- لینک کردن دکمه برگشت به صفحه قبل -->
      <a href="../home/home.html">
        <span class="text-3xl">←</span>
      </a>
      <span class="font-semibold">Most Popular</span>
    </div>

    <!-- Brand Navbar -->
    <div class="mx-6 mt-4 overflow-x-auto clear-both">
      <div class="flex gap-3 w-max pb-2">
        <button
          data-brand="all"
          class="px-4 py-2 rounded-full bg-black text-white border-2 border-black font-semibold"
        >
          All
        </button>
        <button
          data-brand="Nike"
          class="px-4 py-2 rounded-full hover:text-slate-50 hover:bg-black bg-white border-2 border-black font-semibold"
        >
          Nike
        </button>
        <button
          data-brand="Adidas"
          class="px-4 py-2 rounded-full hover:text-slate-50 hover:bg-black bg-white border-2 border-black font-semibold"
        >
          Adidas
        </button>
        <button
          data-brand="Puma"
          class="px-4 py-2 rounded-full hover:text-slate-50 hover:bg-black bg-white border-2 border-black font-semibold"
        >
          Puma
        </button>
        <button
          data-brand="Asics"
          class="px-4 py-2 rounded-full hover:text-slate-50 hover:bg-black bg-white border-2 border-black font-semibold"
        >
          Asics
        </button>
        <button
          data-brand="Reebok"
          class="px-4 py-2 rounded-full hover:text-slate-50 hover:bg-black bg-white border-2 border-black font-semibold"
        >
          Reebok
        </button>
        <button
          data-brand="New Balance"
          class="px-4 py-2 rounded-full hover:text-slate-50 hover:bg-black bg-white border-2 border-black font-semibold"
        >
          New Balance
        </button>
        <button
          data-brand="Converse"
          class="px-4 py-2 rounded-full hover:text-slate-50 hover:bg-black bg-white border-2 border-black font-semibold"
        >
          Converse
        </button>
      </div>
    </div>

    <!-- list product -->
    <div
      id="popular-product-list"
      class="grid grid-cols-2 gap-4 my-2 mx-8 pb-20"
    ></div>

    <!-- برای pagination -->
    <div class="flex justify-center pb-10">
      <button
        id="load-more-btn"
        class="text-center text-sm bg-gray-700 text-white mb-28 w-36 h-8 rounded-md hover:bg-black"
      >
        Load More
      </button>
    </div>

    <!-- nav-bar -->
    <!-- توسط js اضافه میشود -->
    <div id="navbar"></div>

    <script type="module" src="popular.js"></script>
  </body>
</html>
