<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brand-page</title>
    <script src="tailwind.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="font-['Inter']">
    <div class="flex flex-row gap-2 items-center w-60 h-16 mx-8">
      <!-- لینک کردن دکمه برگشت به صفحه قبل -->
      <a href="../home/home.html">
        <span class="text-3xl">←</span>
      </a>
      <span id="brand-name" class="font-semibold"></span>
    </div>

    <!-- list product -->
    <!-- توسط js اضافه میشود -->
    <div
      id="brandBase-product-list"
      class="grid grid-cols-2 gap-4 my-2 mx-8 pb-20"
    ></div>

    <!-- دکمه pagination -->
    <div class="flex justify-center">
      <button
        id="load-more-btn"
        class="text-center text-sm bg-gray-700 text-white mb-10 w-36 h-8 rounded-md hover:bg-black"
      >
        Load More ...
      </button>
    </div>

    <!-- nav-bar -->
    <!-- توسط js اضافه میشود -->
    <div id="navbar"></div>

    <script type="module" src="brand.js"></script>
  </body>
</html>
