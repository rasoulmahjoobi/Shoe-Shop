<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My-Wishlist</title>
    <script src="tailwind.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

      <!-- لینک کردن دکمه برگشت به صفحه قبل -->

        <span class="text-3xl">←</span>
      </a>
      <span class="font-semibold">My Wishlist</span>
      <div class="flex justify-end ml-48 mt-3">

      </div>
    </div>

    <!-- Brand Navbar -->
    <div class="mx-6 mt-8 overflow-x-auto clear-both">
      <div class="flex gap-3 w-max pb-2">
        <button
          data-brand="All"
          class="brand-btn px-4 py-2 rounded-full border-2 border-black font-semibold hover:bg-black hover:text-white"
        >
          All
        </button>

        <button
          data-brand="Nike"
          class="brand-btn px-4 py-2 rounded-full border-2 border-black font-semibold hover:bg-black hover:text-white"
        >
          Nike
        </button>

        <button
          data-brand="Adidas"
          class="brand-btn px-4 py-2 rounded-full border-2 border-black font-semibold hover:bg-black hover:text-white"
        >
          Adidas
        </button>

        <button
          data-brand="Puma"
          class="brand-btn px-4 py-2 rounded-full border-2 border-black font-semibold hover:bg-black hover:text-white"
        >
          Puma
        </button>

        <button
          data-brand="Asics"
          class="brand-btn px-4 py-2 rounded-full border-2 border-black font-semibold hover:bg-black hover:text-white"
        >
          Asics
        </button>

        <button
          data-brand="Reebok"
          class="brand-btn px-4 py-2 rounded-full border-2 border-black font-semibold hover:bg-black hover:text-white"
        >
          Reebok
        </button>

        <button
          data-brand="New Balance"
          class="brand-btn px-4 py-2 rounded-full border-2 border-black font-semibold hover:bg-black hover:text-white"
        >
          New Balance
        </button>

        <button
          data-brand="Converse"
          class="brand-btn px-4 py-2 rounded-full border-2 border-black font-semibold hover:bg-black hover:text-white"
        >
          Converse
        </button>
      </div>
    </div>

    <!-- product list -->
    <div
      id="wishlist-container"
      class="grid grid-cols-2 gap-4 my-2 mx-8 pb-8"
    ></div>

    <div class="flex justify-center mb-24">
      <button
        id="load-more-btn"
        class="text-center text-sm bg-gray-700 text-white mb-28 w-36 h-8 rounded-md hover:bg-black"
      >
        Load More
      </button>
    </div>

    <!-- پیام خالی بودن لیست -->
    <p id="empty-wishlist" class="text-center mt-10 text-gray-500 hidden">
      Your wishlist is empty 💔
    </p>

    <!-- nav-bar -->
    <!-- توسط js اضافه میشود -->
    <div id="navbar"></div>

    <script type="module" src="wishlist.js"></script>
  </body>
</html>
