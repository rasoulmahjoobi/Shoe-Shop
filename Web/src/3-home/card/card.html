<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
    <script src="tailwind.js"></script>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-['Inter'] flex flex-col gap-3">
    <header>
      <div
        class="relative bg-gray-100 flex flex-col items-center justify-center w-full h-96 overflow-hidden"
      >
        <!-- دکمه برگشت -->
        <button id="back-btn" class="absolute top-3 left-4 text-3xl">←</button>
        <!-- عکس -->
        <img
          id="product-image"
          class="w-full h-full object-contain transition-all duration-300"
          src=""
        />
        <!-- نقطه ها (ثابت پایین عکس) -->
        <div
          id="image-buttons"
          class="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2"
        ></div>
      </div>
    </header>
    <main>
      <div class="flex flex-row justify-between mx-5 my-4">
        <!-- نام محصول -->
        <h1 id="product-title" class="font-bold text-3xl"></h1>
        <button id="favorite-btn" data-id="${product.id}" class="py-2">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="white"
            stroke="black"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M2 9.5a5.5 5.5 0 0 1 9.591-3.676.56.56 0 0 0 .818 0A5.49 5.49 0 0 1 22 9.5c0 2.29-1.5 4-3 5.5l-5.492 5.313a2 2 0 0 1-3 .019L5 15c-1.5-1.5-3-3.2-3-5.5"
            />
          </svg>
        </button>
      </div>

      <div id="product-details-1">
        <!-- تعداد sold -->
        <div class="flex flex-row items-center">
          <div
            id="sold-count"
            class="ml-5 text-sm bg-gray-100 text-slate-950 rounded-md h-[26px] px-3"
          ></div>

          <!-- ایکون ستاره -->
          <div class="py-1 ml-4">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
            >
              <defs>
                <linearGradient id="halfStar1">
                  <stop offset="50%" stop-color="black" />
                  <stop offset="50%" stop-color="white" />
                  <stop offset="100%" stop-color="white" />
                </linearGradient>
              </defs>

              <path
                d="M11.525 2.295a.53.53 0 0 1 .95 0l2.31 4.679a2.123 2.123 0 0 0 1.595 1.16l5.166.756a.53.53 0 0 1 .294.904l-3.736 3.638a2.123 2.123 0 0 0-.611 1.878l.882 5.14a.53.53 0 0 1-.771.56l-4.618-2.428a2.122 2.122 0 0 0-1.973 0L6.396 21.01a.53.53 0 0 1-.77-.56l.881-5.139a2.122 2.122 0 0 0-.611-1.879L2.16 9.795a.53.53 0 0 1 .294-.906l5.165-.755a2.122 2.122 0 0 0 1.597-1.16z"
                fill="url(#halfStar1)"
                stroke="black"
                stroke-width="0.5"
              />
            </svg>
          </div>

          <!-- امتیاز و نظرات -->
          <span id="product-rate" class="ml-2 text-slate-500"></span>
          <span id="product-reviews"></span>
        </div>
      </div>

      <!-- description قسمت مربوط به -->
      <div class="mx-5 mt-8">
        <h1 class="font-bold text-xl">Description</h1>
        <p id="product-description" class="py-2 text-sm text-slate-600"></p>
      </div>

      <!-- پیام ناموجود بودن -->
      <p
        id="out-of-stock"
        class="hidden text-center text-red-600 text-2xl font-bold mt-4"
      >
        This product is unavailable
      </p>

      <div id="product-details-2">
        <!-- مربوط به دکمه های size و color -->
        <div class="flex flex-row justify-around gap-16 mr-44 mt-2">
          <!-- دکمه Size  -->
          <div class="flex flex-col">
            <h1 class="ml-5 font-semibold">Size</h1>
            <div
              id="sizes-container"
              class="flex overflow-x-auto gap-2 ml-5 mt-2"
            ></div>
          </div>
          <!-- color دکمه  -->
          <div class="flex flex-col">
            <h1 class="ml-5 font-semibold">Color</h1>
            <div
              id="colors-container"
              class="flex overflow-x-auto gap-2 ml-5 mt-2"
            ></div>
          </div>
        </div>

        <!-- دکمه های تغییر تعداد -->
        <div class="flex flex-row items-center gap-7 m-5">
          <span class="text-lg font-semibold">Quantity</span>
          <div
            class="flex flex-row justify-between gap-4 px-4 py-1 bg-gray-100 w-24 font-semibold rounded-full"
          >
            <button id="minus-btn">-</button>
            <span id="quantity-value">1</span>
            <button id="plus-btn">+</button>
          </div>
        </div>

        <hr class="m-5" />

        <!-- محاسبه قیمت -->
        <div class="flex flex-row items-center justify-between m-5">
          <div class="flex flex-col justify-start gap-2">
            <span class="text-xs text-gray-500">Total price</span>
            <span id="total-price" class="text-xl font-bold"></span>
          </div>
          <button
            id="add-to-cart-btn"
            class="flex flex-row items-center justify-center gap-5 bg-black text-white font-semibold rounded-full w-60 h-14 shadow-black"
          >
            <!-- آیکون سبد خرید داخل دکمه -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-6 h-6"
              viewBox="0 0 20 20"
            >
              <path d="M0 0h20v20H0z" fill="none" />
              <path
                fill="currentColor"
                fill-rule="evenodd"
                d="M10 2a4 4 0 0 0-4 4v1H5a1 1 0 0 0-.994.89l-1 9A1 1 0 0 0 4 18h12a1 1 0 0 0 .994-1.11l-1-9A1 1 0 0 0 15 7h-1V6a4 4 0 0 0-4-4m2 5V6a2 2 0 1 0-4 0v1zm-6 3a1 1 0 1 1 2 0a1 1 0 0 1-2 0m7-1a1 1 0 1 0 0 2a1 1 0 0 0 0-2"
                clip-rule="evenodd"
              />
            </svg>
            Add to Cart
          </button>
        </div>
      </div>
    </main>

    <!-- nav-bar -->
    <!-- توسط js اضافه میشود -->
    <div id="navbar"></div>

    <script type="module" src="card.js"></script>
  </body>
</html>
