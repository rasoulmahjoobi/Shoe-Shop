<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Orders</title>

    <script src="tailwind.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-white font-['Inter'] text-[#222222]">
    <main class="mx-auto min-h-screen w-full max-w-[428px] px-6 pt-8 pb-28">
      <!-- Header -->
      <header class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <h1 class="text-[28px] font-extrabold tracking-[-1px]">My Orders</h1>
        </div>
      </header>

      <!-- Tabs -->
      <section class="mt-12">
        <div class="flex">
          <button
            id="activeTab"
            class="w-1/2 pb-4 text-center text-[20px] font-extrabold text-[#222222]"
          >
            Active
          </button>

          <button
            id="completedTab"
            class="w-1/2 pb-4 text-center text-[20px] font-medium text-[#A7A7A7]"
          >
            Completed
          </button>
        </div>

        <div class="relative h-[3px] w-full bg-[#E9E9E9]">
          <span
            id="tabIndicator"
            class="absolute left-0 top-0 h-[3px] w-1/2 bg-[#111111] transition-all duration-300"
          ></span>
        </div>
      </section>

      <!-- Orders -->
      <section class="mt-8">
        <!-- لیست سفارش‌ها -->
        <div id="ordersContainer" class="space-y-5"></div>

        <!-- Empty State -->
        <section
          id="notFoundSection"
          class="hidden flex flex-col items-center px-5 pt-20 text-center"
        >
          <div class="relative h-[220px] w-[250px]">
            <!-- card back -->
            <div
              class="absolute left-[35px] top-[24px] h-[150px] w-[120px] rotate-[-16deg] rounded-[10px] border border-[#4B4B55] bg-white"
            >
              <div
                class="absolute left-1/2 top-[-18px] h-[32px] w-[105px] -translate-x-1/2 rounded-[5px] bg-[#111111]"
              ></div>
              <div
                class="absolute left-[17px] top-[24px] h-[112px] w-[85px] rounded-[4px] bg-[#F0F0F0]"
              ></div>
              <div
                class="absolute left-1/2 top-[-31px] h-[20px] w-[20px] -translate-x-1/2 rounded-full border-[3px] border-[#111111] bg-white"
              ></div>
            </div>

            <!-- card front -->
            <div
              class="absolute right-[18px] top-[58px] h-[165px] w-[150px] rounded-[10px] border border-[#4B4B55] bg-white"
            >
              <div
                class="absolute left-1/2 top-[-18px] h-[34px] w-[108px] -translate-x-1/2 rounded-[5px] bg-[#111111]"
              ></div>
              <div
                class="absolute left-[19px] top-[22px] h-[122px] w-[112px] rounded-[4px] bg-[#E7E7E7]"
              ></div>
              <div
                class="absolute left-1/2 top-[-31px] h-[20px] w-[20px] -translate-x-1/2 rounded-full border-[3px] border-[#111111] bg-white"
              ></div>
            </div>
          </div>

          <h2 class="mt-8 text-[19px] font-extrabold">
            You don't have an order yet!
          </h2>
        </section>
      </section>
    </main>

    <!-- Navbar -->
    <div id="navbar"></div>

    <script type="module" src="order.js"></script>
  </body>
</html>
