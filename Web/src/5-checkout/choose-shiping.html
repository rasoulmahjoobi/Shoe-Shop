<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
                <script src="tailwind.js"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />

</head>
<body class="font-['Inter']">
     <main class="mx-auto min-h-screen w-full max-w-md px-7 pt-12 pb-40">
      <!-- Header -->
      <header class="mb-12 flex items-center gap-5">
        <a
          href="checkout.html"
          class="flex h-10 w-10 items-center justify-center"
          aria-label="Back"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-8 w-8"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15 18l-6-6 6-6"
            />
          </svg>
        </a>

        <h1 class="text-[28px] font-extrabold">Choose Shipping</h1>
      </header>

      <!-- Shipping List -->
      <section class="space-y-7">
        <!-- Economy -->
        <button
          class="shipping-card flex w-full items-center gap-5 rounded-[34px] bg-white px-5 py-9 text-left shadow-[0_10px_35px_rgba(0,0,0,0.05)]"
          data-name="Economy"
          data-price="10"
          data-arrival="Estimated Arrival, Dec 20-23"
        >
          <div class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full bg-[#1F1F1F]">
            <!-- Package + Check icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-9 w-9 text-white"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5L12 3l9 4.5M3 7.5l9 4.5m0 0l9-4.5M12 12v9M6 9v7l6 3 6-3V9" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.5 15.5l1.5 1.5 3-3" />
            </svg>
          </div>

          <div class="min-w-0 flex-1">
            <h2 class="text-[22px] font-extrabold">Economy</h2>
            <p class="mt-2 text-[16px] text-[#686868]">
              Estimated Arrival, Dec 20-23
            </p>
          </div>

          <p class="text-[25px] font-extrabold">$10</p>

          <span class="radio flex h-10 w-10 shrink-0 items-center justify-center rounded-full border-[4px] border-[#111111]"></span>
        </button>

        <!-- Regular -->
        <button
          class="shipping-card flex w-full items-center gap-5 rounded-[34px] bg-white px-5 py-9 text-left shadow-[0_10px_35px_rgba(0,0,0,0.05)]"
          data-name="Regular"
          data-price="15"
          data-arrival="Estimated Arrival, Dec 20-22"
        >
          <div class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full bg-[#1F1F1F]">
            <!-- Package icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-9 w-9 text-white"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="1.8"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5L12 3l9 4.5M3 7.5l9 4.5m0 0l9-4.5M12 12v9M6 9v7l6 3 6-3V9" />
            </svg>
          </div>

          <div class="min-w-0 flex-1">
            <h2 class="text-[22px] font-extrabold">Regular</h2>
            <p class="mt-2 text-[16px] text-[#686868]">
              Estimated Arrival, Dec 20-22
            </p>
          </div>

          <p class="text-[25px] font-extrabold">$15</p>

          <span class="radio flex h-10 w-10 shrink-0 items-center justify-center rounded-full border-[4px] border-[#111111]">
            <span class="h-5 w-5 rounded-full bg-[#111111]"></span>
          </span>
        </button>

        <!-- Cargo -->
        <button
          class="shipping-card flex w-full items-center gap-5 rounded-[34px] bg-white px-5 py-9 text-left shadow-[0_10px_35px_rgba(0,0,0,0.05)]"
          data-name="Cargo"
          data-price="20"
          data-arrival="Estimated Arrival, Dec 19-20"
        >
          <div class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full bg-[#1F1F1F]">
            <!-- Truck icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-9 w-9 text-white"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M3 5h11v10H3V5zm12 3h3.5L22 11.5V15h-1a3 3 0 11-6 0h-1V8zm3.5 1.5H16V12h4.5l-2-2.5zM7 17a3 3 0 100 6 3 3 0 000-6zm11 0a3 3 0 100 6 3 3 0 000-6z" />
            </svg>
          </div>

          <div class="min-w-0 flex-1">
            <h2 class="text-[22px] font-extrabold">Cargo</h2>
            <p class="mt-2 text-[16px] text-[#686868]">
              Estimated Arrival, Dec 19-20
            </p>
          </div>

          <p class="text-[25px] font-extrabold">$20</p>

          <span class="radio flex h-10 w-10 shrink-0 items-center justify-center rounded-full border-[4px] border-[#111111]"></span>
        </button>

        <!-- Express -->
        <button
          class="shipping-card flex w-full items-center gap-5 rounded-[34px] bg-white px-5 py-9 text-left shadow-[0_10px_35px_rgba(0,0,0,0.05)]"
          data-name="Express"
          data-price="30"
          data-arrival="Estimated Arrival, Dec 18-19"
        >
          <div class="flex h-16 w-16 shrink-0 items-center justify-center rounded-full bg-[#1F1F1F]">
            <!-- Fast truck icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-9 w-9 text-white"
              fill="currentColor"
              viewBox="0 0 24 24"
            >
              <path d="M2 7h10v2H2V7zm0 4h8v2H2v-2zm11-5h4l4 5v5h-2a3 3 0 11-6 0h-1V6zm4 2v4h3.5L17.5 8H17zm-1 9a2 2 0 100 4 2 2 0 000-4zm-9 0a2 2 0 100 4 2 2 0 000-4z" />
            </svg>
          </div>

          <div class="min-w-0 flex-1">
            <h2 class="text-[22px] font-extrabold">Express</h2>
            <p class="mt-2 text-[16px] text-[#686868]">
              Estimated Arrival, Dec 18-19
            </p>
          </div>

          <p class="text-[25px] font-extrabold">$30</p>

          <span class="radio flex h-10 w-10 shrink-0 items-center justify-center rounded-full border-[4px] border-[#111111]"></span>
        </button>
      </section>
    </main>

    <!-- Apply Button -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white px-7 py-7 shadow-[0_-8px_25px_rgba(0,0,0,0.05)]">
      <div class="mx-auto max-w-md">
        <button
          id="applyShippingButton"
          class="h-[72px] w-full rounded-full bg-[#111111] text-[22px] font-extrabold text-white shadow-[0_12px_20px_rgba(0,0,0,0.22)]"
        >
          Apply
        </button>
      </div>
    </footer>

    <script>
      const shippingCards = document.querySelectorAll(".shipping-card");
      const applyShippingButton = document.getElementById(
        "applyShippingButton"
      );

      let selectedShipping = {
        name: "Regular",
        price: 15,
        arrival: "Estimated Arrival, Dec 20-22",
      };

      shippingCards.forEach((card) => {
        card.addEventListener("click", function () {
          selectedShipping = {
            name: this.dataset.name,
            price: this.dataset.price,
            arrival: this.dataset.arrival,
          };

          shippingCards.forEach((item) => {
            item.querySelector(".radio").innerHTML = "";
          });

          this.querySelector(".radio").innerHTML =
            '<span class="h-5 w-5 rounded-full bg-[#111111]"></span>';
        });
      });

      applyShippingButton.addEventListener("click", function () {
        localStorage.setItem(
          "selectedShipping",
          JSON.stringify(selectedShipping)
        );

        window.location.href = "checkout.html";
      });
    </script>
</body>
</html>
