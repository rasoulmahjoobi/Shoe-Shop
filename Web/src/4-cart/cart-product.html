<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cart-product</title>

    <script src="tailwind.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="font-['Inter']">
    <!-- Header -->
    <header>
      <div class="flex flex-row gap-6 my-10 mx-4">
        <svg
          width="40"
          height="40"
          viewBox="0 0 54 81"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M9.23355 17.7415C22.2531 10.4389 33.6453 3.542 39.7482 0.499261C44.834 -2.54348 47.1042 9.00132 42.7997 16.7273C38.4952 24.4532 26.5252 28.8982 26.5252 28.8982C26.5252 28.8982 52.9712 22.8128 53.9884 46.1404C54.2537 52.2259 49.9198 59.3256 46.8683 61.3541C43.8168 63.3826 17.3708 79.1034 14.3194 80.6248C10.7425 82.4081 9.23359 77.582 9.23359 71.4965C9.23359 57.2971 25.5081 52.2259 25.5081 52.2259C11.2679 54.2544 2.1135 49.1832 0.0791923 33.9695C-0.598903 28.8982 3.13068 21.1646 9.23355 17.7415Z"
            fill="black"
          />
        </svg>

        <h1 class="text-3xl font-bold">My Cart</h1>

        <div class="ml-36">
          <span>
            <svg
              width="45"
              height="45"
              viewBox="0 0 20 20"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect width="18" height="18" fill="white" fill-opacity="0.01" />
              <g clip-path="url(#clip0_36_9509)">
                <path
                  d="M12.742 11.344C13.7103 10.0227 14.144 8.38447 13.9563 6.75713C13.7686 5.12979 12.9734 3.63332 11.7297 2.56711C10.4861 1.5009 8.88573 0.943582 7.24882 1.00666C5.61191 1.06973 4.05917 1.74854 2.90125 2.90729C1.74333 4.06603 1.06563 5.61926 1.00373 7.25621C0.941829 8.89317 1.50029 10.4931 2.56739 11.736C3.63449 12.9789 5.13153 13.773 6.759 13.9596C8.38648 14.1461 10.0244 13.7112 11.345 12.742H11.344C11.374 12.782 11.406 12.82 11.442 12.857L15.292 16.707C15.4795 16.8946 15.7339 17.0001 15.9991 17.0002C16.2644 17.0003 16.5188 16.895 16.7065 16.7075C16.8941 16.52 16.9996 16.2656 16.9997 16.0003C16.9998 15.7351 16.8945 15.4806 16.707 15.293L12.857 11.443C12.8212 11.4068 12.7828 11.3734 12.742 11.343V11.344ZM13 7.49998C13 8.22225 12.8577 8.93745 12.5813 9.60474C12.3049 10.272 11.8998 10.8783 11.3891 11.3891C10.8783 11.8998 10.272 12.3049 9.60474 12.5813C8.93745 12.8577 8.22225 13 7.49998 13C6.77771 13 6.06251 12.8577 5.39522 12.5813C4.72793 12.3049 4.12162 11.8998 3.61089 11.3891C3.10017 10.8783 2.69505 10.272 2.41864 9.60474C2.14224 8.93745 1.99998 8.22225 1.99998 7.49998C1.99998 6.04129 2.57945 4.64234 3.6109 3.61089C4.64235 2.57944 6.04129 1.99998 7.49998 1.99998C8.95867 1.99998 10.3576 2.57944 11.3891 3.61089C12.4205 4.64234 13 6.04129 13 7.49998Z"
                  fill="#6C757D"
                />
              </g>

              <defs>
                <clipPath id="clip0_36_9509">
                  <rect
                    width="16"
                    height="16"
                    fill="white"
                    transform="translate(1 1)"
                  />
                </clipPath>
              </defs>
            </svg>
          </span>
        </div>
      </div>
    </header>

    <!-- Products -->
    <main
      id="cart-list"
      class="h-[calc(100vh-300px)] overflow-y-auto pb-8"
    ></main>

    <!-- اگر کارت خالی باشد -->
    <div
      id="empty-cart"
      class="hidden flex-col items-center justify-center mt-24 px-6"
    >
      <h2 class="text-2xl font-bold">Your cart is empty 🛒</h2>

      <p class="text-gray-500 mt-3 text-center">
        Looks like you haven't added anything yet.
      </p>

      <a
        href="/Web/src/3-home/home/home.html"
        class="mt-6 bg-black text-white px-6 py-3 rounded-full"
      >
        Continue Shopping
      </a>
    </div>

    <!-- Total -->
    <div
      class="fixed bottom-16 left-0 w-full bg-white z-50 shadow-[0_-8px_25px_rgba(0,0,0,0.08)]"
    >
      <div class="flex flex-row items-center justify-between m-5">
        <div class="flex flex-col justify-start gap-2">
          <span class="text-xs text-gray-500">Total price</span>
          <span id="total-price" class="text-xl font-bold">$0.00</span>
        </div>

        <button
          id="checkout-btn"
          class="flex flex-row items-center justify-center gap-5 bg-black text-white font-semibold rounded-full w-60 h-14"
        >
          <span>Checkout</span>
          <span>➜</span>
        </button>
      </div>
    </div>

    <!-- Remove Modal -->
    <div
      id="removeModal"
      class="fixed mb-16 inset-0 z-50 hidden items-end justify-center bg-black/60"
    >
      <div
        id="modalContent"
        class="w-full max-w-md rounded-t-[32px] bg-white px-5 pt-3 pb-7 shadow-2xl"
      >
        <div class="mx-auto mb-4 h-1 w-10 rounded-full bg-gray-300"></div>

        <h2
          class="border-b border-gray-100 pb-4 text-center text-lg font-bold text-gray-800"
        >
          Remove From Cart?
        </h2>

        <div
          class="my-4 flex items-center gap-3 rounded-[22px] bg-white p-3 shadow-md"
        >
          <div
            class="flex h-20 w-20 items-center justify-center rounded-2xl bg-gray-100"
          >
            <img
              id="modalProductImage"
              src=""
              alt="product"
              class="h-16 w-16 object-contain"
            />
          </div>

          <div class="flex-1">
            <h3 id="modalProductName" class="text-sm font-bold text-gray-800">
              Product Name
            </h3>

            <p id="modalProductInfo" class="mt-1 text-[10px] text-gray-400">
              Color | Size
            </p>

            <p
              id="modalProductPrice"
              class="mt-2 text-sm font-bold text-gray-800"
            >
              $0.00
            </p>
          </div>

          <div
            id="modalProductQuantity"
            class="rounded-full bg-gray-100 px-3 py-1 text-xs text-gray-700"
          >
            - 1 +
          </div>
        </div>

        <div class="mt-6 flex gap-3 border-t border-gray-100 pt-4">
          <button
            id="cancelRemoveBtn"
            class="w-1/2 rounded-full bg-gray-200 py-3 text-sm font-semibold text-gray-700"
            type="button"
          >
            Cancel
          </button>

          <button
            id="confirmRemoveBtn"
            class="w-1/2 rounded-full bg-black py-3 text-sm font-semibold text-white shadow-lg"
            type="button"
          >
            Yes, Remove
          </button>
        </div>
      </div>
    </div>

    <!-- nav-bar -->
    <!-- توسط js اضافه میشود -->
    <div id="navbar"></div>

    <script type="module" src="cart-product.js"></script>
  </body>
</html>
