<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login page</title>
    <script src="tailwind.js"></script>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-['Inter']">
    <div>
      <div class="px-5 pt-3">
        <!-- لینک کردن دکمه برگشت به صفحه قبل -->
          <a href="../1-onboarding/onboarding-index.html">
            <span class="text-3xl">←</span>
          </a>
      </div>

      <div class="flex flex-col items-center justify-center my-32">
        <svg
          width="54"
          height="81"
          viewBox="0 0 54 81"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M9.23355 17.7415C22.2531 10.4389 33.6453 3.542 39.7482 0.499261C44.834 -2.54348 47.1042 9.00132 42.7997 16.7273C38.4952 24.4532 26.5252 28.8982 26.5252 28.8982C26.5252 28.8982 52.9712 22.8128 53.9884 46.1404C54.2537 52.2259 49.9198 59.3256 46.8683 61.3541C43.8168 63.3826 17.3708 79.1034 14.3194 80.6248C10.7425 82.4081 9.23359 77.582 9.23359 71.4965C9.23359 57.2971 25.5081 52.2259 25.5081 52.2259C11.2679 54.2544 2.1135 49.1832 0.0791923 33.9695C-0.598903 28.8982 3.13068 21.1646 9.23355 17.7415Z"
            fill="black"
          />
        </svg>
      </div>

      <div class="text-3xl flex flex-col justify-center items-center">
        <h1>Login Your Account</h1>
      </div>
    </div>

    <div class="flex flex-col justify-center gap-5 mt-12 mx-6">
      <div class="relative w-full">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-black"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 8l9 6 9-6m-18 0v8a2 2 0 002 2h14a2 2 0 002-2V8m-18 0a2 2 0 012-2h14a2 2 0 012 2"
          />
        </svg>
        <input
          id="email-input"
          class="w-full h-10 px-3 py-2 pl-10 bg-[#FAFAFA] border border-transparent outline-none"
          type="text"
          placeholder="Email"
        />
        <div
          id="email-suggestions"
          class="hidden absolute top-full left-0 w-full bg-white border border-gray-300 rounded-b-lg shadow-md z-50"
        ></div>
      </div>

      <div class="relative w-full">
        <svg
          class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-black"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            d="M10 2a4 4 0 00-4 4v2H5a1 1 0 00-1 1v8a1 1 0 001 1h10a1 1 0 001-1V9a1 1 0 00-1-1h-1V6a4 4 0 00-4-4zm-2 6V6a2 2 0 114 0v2H8z"
          />
        </svg>
        <input
          id="password-input"
          class="w-full h-10 px-3 py-2 pl-10 bg-[#FAFAFA] border border-transparent outline-none"
          type="password"
          placeholder="Password"
        />
      </div>
    </div>

    <div class="flex flex-row items-center gap-4 mx-36 mt-10">
      <input id="remember-me" class="w-4 h-4 bg-black" type="checkbox" />
      <span>Remember me</span>
    </div>

    <div id="savedUser" class="mx-6 mt-2 text-sm text-gray-500"></div>

    <div class="mb-9 mt-40 mx-6">
      <button
        id="loginBtn"
        class="text-slate-50 rounded-3xl bg-slate-400 w-full h-12 border-0"
      >
        <a href="www.google.com"> Sing in </a>
      </button>
    </div>
    <script src="login-page-script.js"></script>
  </body>
</html>
